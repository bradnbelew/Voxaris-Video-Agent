<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Aria — Virtual Property Showing</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #f5f5f5;
        --muted: #9ca3af;
        --accent: #2ecc71;
        --panel: rgba(15, 15, 15, 0.78);
        --border: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        overflow: hidden;
      }
      #root { position: fixed; inset: 0; }
      #call { position: absolute; inset: 0; background: #000; }
      #call iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      #loading, #error {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        padding: 32px;
        text-align: center;
      }
      #error { display: none; }

      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(46, 204, 113, 0.25);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
      p  { margin: 0; color: var(--muted); font-size: 14px; max-width: 420px; line-height: 1.5; }

      button {
        background: var(--accent);
        color: #052814;
        border: 0;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.05); }

      #bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
        background: var(--panel);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border);
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
      }
      #bar.visible { display: flex; }
      #bar .addr { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #bar .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
      }
      #bar .badge.active {
        border-color: rgba(46, 204, 113, 0.4);
        color: var(--accent);
        background: rgba(46, 204, 113, 0.08);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="spinner"></div>
        <h1>Starting your virtual showing…</h1>
        <p>Aria is warming up. This takes just a few seconds.</p>
      </div>
      <div id="error">
        <h1 style="color:#f87171">Something went wrong</h1>
        <p id="errMsg">We couldn't start the showing. Please try again.</p>
        <button onclick="location.reload()">Try Again</button>
      </div>
      <div id="call"></div>
      <div id="bar">
        <div class="addr" id="addr">Loading listing…</div>
        <div id="tourBadge" class="badge"><span class="dot"></span><span>Tour not yet booked</span></div>
      </div>
    </div>

    <script>
      const qs = new URLSearchParams(location.search);
      const params = {
        visitor_name: qs.get("name") || "there",
        listing_id: qs.get("listing_id") || "1005192",
        source: qs.get("source") || "web",
        brokerage_name: qs.get("agency") || "our brokerage",
      };

      let conversationId = null;
      let pollTimer = null;

      function show(id) {
        ["loading", "error", "call"].forEach((el) => {
          const node = document.getElementById(el);
          node.style.display = el === id ? (el === "call" ? "block" : "flex") : "none";
        });
      }

      function showError(msg) {
        document.getElementById("errMsg").textContent = msg || "Unknown error";
        show("error");
      }

      function embed(url) {
        const holder = document.getElementById("call");
        const iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.allow = "camera; microphone; autoplay; display-capture; fullscreen";
        iframe.setAttribute("allowfullscreen", "true");
        holder.innerHTML = "";
        holder.appendChild(iframe);
        show("call");
      }

      function markTourBooked() {
        const badge = document.getElementById("tourBadge");
        badge.classList.add("active");
        badge.querySelector("span:last-child").textContent = "Tour request received ✓";
      }

      async function startConversation() {
        try {
          const r = await fetch("/api/realty/conversations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(params),
          });
          const data = await r.json();
          if (!r.ok || !data.conversation_url) {
            throw new Error(data.error || "Failed to start conversation");
          }
          conversationId = data.conversation_id;
          document.getElementById("addr").textContent =
            data.listing_address || "Virtual Showing";
          document.getElementById("bar").classList.add("visible");
          embed(data.conversation_url);
          startPolling();
        } catch (e) {
          showError(e.message);
        }
      }

      async function pollSession() {
        if (!conversationId) return;
        try {
          const r = await fetch(
            `/api/realty/tools?conversation_id=${encodeURIComponent(conversationId)}`
          );
          const data = await r.json();
          const s = data && data.session;
          if (!s) return;
          if (s.tour_requested || s.preferred_date || s.preferred_time) {
            markTourBooked();
          }
          if (s.status === "ended" || s.status === "completed") {
            clearInterval(pollTimer);
          }
        } catch (_) {
          /* ignore transient errors */
        }
      }

      function startPolling() {
        pollTimer = setInterval(pollSession, 3000);
      }

      /**
       * Tavus surfaces Raven-1 perception tool calls via Daily.js `app-message`
       * events. Inside the iframe those events are emitted by Daily; we listen
       * here with window.postMessage in case Tavus forwards them (some setups
       * do, some don't). Any perception tool call we receive is forwarded to
       * the /api/realty/tools POST endpoint so the session row stays updated.
       */
      window.addEventListener("message", (ev) => {
        const data = ev.data || {};
        if (data && data.event_type === "conversation.tool_call" && conversationId) {
          fetch("/api/realty/tools", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              conversation_id: conversationId,
              tool_name: data.tool_name || (data.tool && data.tool.name),
              tool_call_id: data.tool_call_id || "perception_" + Date.now(),
              parameters: data.arguments || data.parameters || {},
            }),
          }).catch(() => {});
        }
      });

      startConversation();
    </script>
  </body>
</html>
